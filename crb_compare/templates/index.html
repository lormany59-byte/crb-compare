<!doctype html>
<html lang="lo">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ລະບົບສົມທຽບເງິນຝາກ CRB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { font-family: "Noto Sans Lao", Arial, sans-serif; background:#f4f6f5; }
  .brand-bar { background:#1E7A46; color:#fff; padding:1.25rem 0; }
  .drop-zone {
    border: 2px dashed #1E7A46; border-radius: .5rem; padding: 2rem 1rem;
    text-align:center; background:#fff; cursor:pointer; transition:.15s;
  }
  .drop-zone.dragover { background:#eaf6ef; border-color:#0f5c33; }
  .drop-zone input[type=file] { display:none; }
  .drop-zone .filename { font-weight:600; color:#1E7A46; word-break:break-all; }
  .card { border:none; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  #result-error { white-space:pre-wrap; }
  .spinner-wrap { display:none; }
</style>
</head>
<body>

<div class="brand-bar mb-4">
  <div class="container">
    <h1 class="h4 mb-0">ລະບົບສົມທຽບເງິນຝາກ CRB</h1>
    <div class="small">CRB Deposit Comparison System</div>
  </div>
</div>

<div class="container pb-5">
  <div class="card p-4 mb-4">
    <form id="compare-form">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">ໄຟລ໌ CRB #1</label>
          <div class="drop-zone" id="zone-a">
            <div>ລາກໄຟລ໌ມາວາງ ຫຼື ກົດເພື່ອເລືອກ</div>
            <div class="filename" id="name-a"></div>
            <input type="file" id="file_a" name="file_a" accept=".xlsx">
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">ໄຟລ໌ CRB #2</label>
          <div class="drop-zone" id="zone-b">
            <div>ລາກໄຟລ໌ມາວາງ ຫຼື ກົດເພື່ອເລືອກ</div>
            <div class="filename" id="name-b"></div>
            <input type="file" id="file_b" name="file_b" accept=".xlsx">
          </div>
        </div>
      </div>

      <p class="text-muted small mt-2 mb-3">
        ບໍ່ຕ້ອງລະບຸວ່າອັນໃດເກົ່າ/ໃໝ່ — ລະບົບຈະ auto-detect ຈາກ PROCESSING DATE.
      </p>

      <details class="mb-3">
        <summary class="fw-semibold" style="cursor:pointer">ປັບ Threshold (optional)</summary>
        <div class="row g-2 mt-2">
          {% for cur, val in config.thresholds.items() %}
          <div class="col-md-3">
            <label class="form-label small mb-0">{{ cur }}</label>
            <input type="number" class="form-control form-control-sm"
                   name="threshold_{{ cur }}" value="{{ val }}">
          </div>
          {% endfor %}
        </div>
      </details>

      <button type="submit" class="btn btn-success px-4" id="submit-btn">ປະມວນຜົນ ແລະ ດາວໂຫຼດ</button>
      <span class="spinner-border spinner-border-sm text-success ms-2 spinner-wrap" id="spinner"></span>
    </form>
  </div>

  <div id="result-ok" class="alert alert-success d-none"></div>
  <div id="result-error" class="alert alert-danger d-none"></div>
</div>

<script>
function setupDropZone(zoneId, inputId, nameId) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const nameEl = document.getElementById(nameId);

  zone.addEventListener('click', () => input.click());
  input.addEventListener('change', () => {
    nameEl.textContent = input.files[0] ? input.files[0].name : '';
  });
  ['dragenter', 'dragover'].forEach(evt =>
    zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.add('dragover'); })
  );
  ['dragleave', 'drop'].forEach(evt =>
    zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.remove('dragover'); })
  );
  zone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) {
      input.files = e.dataTransfer.files;
      nameEl.textContent = input.files[0].name;
    }
  });
}
setupDropZone('zone-a', 'file_a', 'name-a');
setupDropZone('zone-b', 'file_b', 'name-b');

const form = document.getElementById('compare-form');
const okBox = document.getElementById('result-ok');
const errBox = document.getElementById('result-error');
const spinner = document.getElementById('spinner');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  okBox.classList.add('d-none');
  errBox.classList.add('d-none');

  const fileA = document.getElementById('file_a').files[0];
  const fileB = document.getElementById('file_b').files[0];
  if (!fileA || !fileB) {
    errBox.textContent = 'ກະລຸນາເລືອກ 2 ໄຟລ໌ CRB.';
    errBox.classList.remove('d-none');
    return;
  }

  const formData = new FormData(form);
  spinner.style.display = 'inline-block';
  submitBtn.disabled = true;

  try {
    const resp = await fetch('/process', { method: 'POST', body: formData });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({error: 'ເກີດຂໍ້ຜິດພາດ'}));
      errBox.textContent = data.error || 'ເກີດຂໍ້ຜິດພາດ';
      errBox.classList.remove('d-none');
      return;
    }
    const blob = await resp.blob();
    const disposition = resp.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : 'crb_report.xlsx';

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    okBox.textContent = 'ສຳເລັດ! ໄຟລ໌ດາວໂຫຼດແລ້ວ: ' + filename;
    okBox.classList.remove('d-none');
  } catch (err) {
    errBox.textContent = 'ເຊື່ອມຕໍ່ server ບໍ່ໄດ້: ' + err;
    errBox.classList.remove('d-none');
  } finally {
    spinner.style.display = 'none';
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
